<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <base href="/">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proto — AppName</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/iconify-icon@2/dist/iconify-icon.min.js"></script>
    <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
    <script type="module" src="https://cdn.jsdelivr.net/gh/djalmajr/z-proto@main/src/z-proto.js"></script>
    <script type="importmap">
      {
        "imports": {
          "~/": "./",
          "htm/preact": "https://esm.sh/htm@3/preact?external=preact",
          "preact-iso": "https://esm.sh/preact-iso@2?external=preact",
          "preact": "https://esm.sh/preact@10",
          "preact/": "https://esm.sh/preact@10/"
        }
      }
    </script>
    <link rel="stylesheet" href="./index.css">
    <style type="text/tailwindcss">
      @theme inline {
        --font-sans: 'Inter', sans-serif;
        --color-background: var(--background);
        --color-foreground: var(--foreground);
        --color-card: var(--card);
        --color-card-foreground: var(--card-foreground);
        --color-popover: var(--popover);
        --color-popover-foreground: var(--popover-foreground);
        --color-primary: var(--primary);
        --color-primary-foreground: var(--primary-foreground);
        --color-secondary: var(--secondary);
        --color-secondary-foreground: var(--secondary-foreground);
        --color-muted: var(--muted);
        --color-muted-foreground: var(--muted-foreground);
        --color-accent: var(--accent);
        --color-accent-foreground: var(--accent-foreground);
        --color-destructive: var(--destructive);
        --color-destructive-foreground: var(--destructive-foreground);
        --color-border: var(--border);
        --color-input: var(--input);
        --color-ring: var(--ring);
        --radius-sm: calc(var(--radius) - 4px);
        --radius-md: calc(var(--radius) - 2px);
        --radius-lg: var(--radius);
        --radius-xl: calc(var(--radius) + 4px);
        --color-sidebar: var(--sidebar);
        --color-sidebar-foreground: var(--sidebar-foreground);
        --color-sidebar-primary: var(--sidebar-primary);
        --color-sidebar-primary-foreground: var(--sidebar-primary-foreground);
        --color-sidebar-accent: var(--sidebar-accent);
        --color-sidebar-accent-foreground: var(--sidebar-accent-foreground);
        --color-sidebar-border: var(--sidebar-border);
        --color-sidebar-ring: var(--sidebar-ring);
      }
      @layer base {
        * { @apply border-border; }
        body { @apply bg-background text-foreground; }
      }
    </style>
  </head>
  <body class="font-sans antialiased">
    <!-- To export to Figma, add figma-key="YOUR_KEY" below. -->
    <!-- The key is generated by Figma desktop the first time you "Paste from Web". See SKILL.md → Figma export. -->
    <z-proto>
      <z-proto-header></z-proto-header>
      <z-proto-body title="Proto — AppName">
        <div id="app" class="flex flex-1 overflow-hidden bg-background"></div>
      </z-proto-body>
    </z-proto>
    <script type="module" src="./index.js"></script>
  </body>
</html>
